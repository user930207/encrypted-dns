name: Watch upstream DNS profile updates

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/paulmillr/encrypted-dns.git
          git fetch upstream master
          git fetch origin master

      - name: Detect DNS profile related changes
        run: |
          CHANGED=$(git diff --name-only origin/master..upstream/master)

          echo "Changed files from upstream:"
          echo "$CHANGED"

          PROFILE_CHANGES=$(echo "$CHANGED" | grep -E '^(profiles/.*\.mobileconfig|src/|README\.md)' || true)

          if [ -n "$PROFILE_CHANGES" ]; then
            echo "DNS profile related files changed upstream:"
            echo "$PROFILE_CHANGES"
            echo "Open https://github.com/paulmillr/encrypted-dns and download updated signed profiles."
            exit 1
          fi

          echo "No DNS profile related changes detected."
